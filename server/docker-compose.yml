services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      MONGO_URI: mongodb://mongo:27017/shoevista
    depends_on:
      - mongo

volumes:
  mongo_data:
